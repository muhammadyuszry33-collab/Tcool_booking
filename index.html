<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TCOOL Aircond Enterprise | Sistem Tempahan Pintar</title>
    
    <link href="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.15/index.global.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.15/index.global.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root { --primary: #0a3d62; --secondary: #3c6382; --accent: #ffc107; --success: #25d366; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Roboto, sans-serif; }
        body { background-color: #f4f7f6; padding: 15px; }
        .container { max-width: 1100px; margin: auto; }

        .header { 
            background: linear-gradient(135deg, var(--primary), var(--secondary)); 
            color: white; padding: 35px 20px; border-radius: 20px; 
            margin-bottom: 25px; text-align: center; box-shadow: 0 8px 20px rgba(0,0,0,0.1); 
        }
        .header h1 { font-size: 2.2rem; margin-bottom: 8px; font-weight: 800; }

        .main-layout { display: grid; grid-template-columns: 1fr; gap: 25px; }
        @media (min-width: 900px) { .main-layout { grid-template-columns: 1.1fr 0.9fr; } }

        .card { background: white; padding: 25px; border-radius: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); border: 1px solid #eef0f2; }
        .card-title { font-size: 1.25rem; color: var(--primary); margin-bottom: 20px; font-weight: 700; border-bottom: 2px solid #f8f9fa; padding-bottom: 12px; display: flex; align-items: center; gap: 10px; }

        #calendar { background: #fff; border-radius: 12px; }
        .fc .fc-toolbar-title { font-size: 1.2rem !important; font-weight: 700; color: var(--primary); }
        .fc .fc-button-primary { background-color: var(--primary); border: none; }

        .slots-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(110px, 1fr)); gap: 12px; margin-top: 15px; }
        .slot-btn { padding: 12px; border: 2px solid #edeff0; border-radius: 12px; text-align: center; cursor: pointer; transition: 0.3s; font-size: 0.95rem; font-weight: 600; background: #fafafa; }
        .slot-btn:hover { border-color: var(--accent); }
        .slot-btn.active { background: var(--primary); color: white; border-color: var(--primary); }

        .form-group { margin-bottom: 18px; }
        label { display: block; margin-bottom: 7px; font-weight: 600; font-size: 0.9rem; color: #555; }
        input, select, textarea { width: 100%; padding: 13px 16px; border: 1.5px solid #e0e0e0; border-radius: 12px; font-size: 1rem; }

        .summary-box { background: #f8f9fa; padding: 20px; border-radius: 15px; border-left: 6px solid var(--accent); margin: 20px 0; }
        .price-display { font-size: 1.6rem; color: #2ecc71; font-weight: 800; display: block; }
        .price-note { font-size: 0.8rem; color: #e67e22; font-weight: 600; margin-top: 5px; }

        .btn-whatsapp { 
            width: 100%; padding: 20px; background: var(--success); color: white; border: none; 
            border-radius: 50px; font-size: 1.15rem; font-weight: 700; cursor: pointer; 
            display: flex; align-items: center; justify-content: center; gap: 12px; 
            transition: 0.3s; box-shadow: 0 10px 20px rgba(37, 211, 102, 0.2); 
        }
        .btn-whatsapp:hover { background: #1ebd5b; transform: translateY(-3px); }

        footer { text-align: center; margin-top: 40px; color: #888; font-size: 0.85rem; padding-bottom: 20px; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1><i class="fas fa-snowflake"></i> TCOOL AIRCOND</h1>
        <p>Servis Professional | Harga Telus & Tetap</p>
    </div>

    <div class="main-layout">
        <div class="card">
            <div class="card-title"><i class="fas fa-calendar-alt"></i> 1. Pilih Tarikh & Masa</div>
            <div id="calendar"></div>
            <div id="timeSlotsGrid" class="slots-grid"></div>
        </div>

        <div class="card">
            <div class="card-title"><i class="fas fa-edit"></i> 2. Maklumat Tempahan</div>
            
            <div class="form-group">
                <label>Nama Penuh</label>
                <input type="text" id="custName" placeholder="Nama anda">
            </div>

            <div class="form-group">
                <label>Alamat Lokasi</label>
                <textarea id="custAddress" rows="2" placeholder="Alamat lengkap lokasi servis"></textarea>
            </div>

            <div class="form-group">
                <label>Jenis Perkhidmatan</label>
                <select id="serviceType" onchange="updatePrice()">
                    <option value="Normal Service">Normal Service (RM90)</option>
                    <option value="Chemical Service">Chemical Service (Canvas)</option>
                    <option value="Overhaul Service">Overhaul Service (Walltype)</option>
                    <option value="Checking">Checking / Repair (RM90)</option>
                    <option value="Installation">Installation (Pemasangan)</option>
                </select>
            </div>

            <div class="form-group" id="hpSection">
                <label>Saiz HP Aircond</label>
                <select id="hpSize" onchange="updatePrice()">
                    <option value="1.0">1.0 HP</option>
                    <option value="1.5">1.5 HP</option>
                    <option value="2.0">2.0 HP</option>
                    <option value="2.5">2.5 HP</option>
                    <option value="3.0">3.0 HP</option>
                </select>
            </div>

            <div class="summary-box">
                <p>Tarikh: <strong id="valDate">-</strong> | Masa: <strong id="valTime">-</strong></p>
                <p>Jenis: <strong id="valService">-</strong> (<strong id="valHP">-</strong>)</p>
                <span class="price-display" id="valPrice">RM 0.00</span>
                <p class="price-note">*setiap harga sudah termasuk labour & transport.. tiada sebarang penambahan</p>
            </div>

            <button class="btn-whatsapp" onclick="submitBooking()">
                <i class="fab fa-whatsapp"></i> Sahkan Melalui WhatsApp
            </button>
        </div>
    </div>

    <footer>&copy; 2025 TCOOL AIRCOND ENTERPRISE.</footer>
</div>

<script>
    let selectedDate = "";
    let selectedTime = "";
    const whatsappNumber = "601161606431";

    const dataHarga = {
        "Chemical Service": { "1.0": 130, "1.5": 130, "2.0": 150, "2.5": 180, "3.0": 180 },
        "Overhaul Service": { "1.0": 180, "1.5": 180, "2.0": 220, "2.5": 220, "3.0": 280 },
        "Installation": { "1.0": 280, "1.5": 300, "2.0": 350, "2.5": 380, "3.0": 430 }
    };

    document.addEventListener('DOMContentLoaded', function() {
        const calendarEl = document.getElementById('calendar');
        const calendar = new FullCalendar.Calendar(calendarEl, {
            initialView: 'dayGridMonth',
            height: 'auto',
            dateClick: function(info) {
                selectedDate = info.dateStr;
                document.getElementById('valDate').innerText = selectedDate;
                generateSlots();
                updatePrice();
            }
        });
        calendar.render();
        updatePrice();
    });

    function generateSlots() {
        const grid = document.getElementById('timeSlotsGrid');
        const slots = ["09:00 AM", "11:00 AM", "02:00 PM", "04:00 PM", "08:00 PM"];
        grid.innerHTML = "";
        slots.forEach(time => {
            const btn = document.createElement('div');
            btn.className = "slot-btn";
            btn.innerText = time;
            btn.onclick = () => {
                document.querySelectorAll('.slot-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                selectedTime = time;
                document.getElementById('valTime').innerText = time;
            };
            grid.appendChild(btn);
        });
    }

    function updatePrice() {
        const service = document.getElementById('serviceType').value;
        const hp = document.getElementById('hpSize').value;
        const hpSec = document.getElementById('hpSection');
        let finalPrice = 0;

        // Sembunyikan HP jika Normal atau Checking
        if (service === "Normal Service" || service === "Checking") {
            hpSec.style.display = "none";
            finalPrice = 90;
        } else {
            hpSec.style.display = "block";
            finalPrice = dataHarga[service][hp];
        }

        document.getElementById('valService').innerText = service;
        document.getElementById('valHP').innerText = (hpSec.style.display === "none") ? "Any Type" : hp + " HP";
        document.getElementById('valPrice').innerText = "RM " + finalPrice + ".00";
    }

    function submitBooking() {
        const name = document.getElementById('custName').value.trim();
        const address = document.getElementById('custAddress').value.trim();
        const service = document.getElementById('valService').innerText;
        const hp = document.getElementById('valHP').innerText;
        const price = document.getElementById('valPrice').innerText;

        if(!selectedDate || !selectedTime || !name || !address) {
            Swal.fire('Info', 'Sila pilih tarikh, masa dan isi maklumat lengkap.', 'info');
            return;
        }

        const msg = `*TEMPAHAN TCOOL AIRCOND*%0A` +
                    `*Nama:* ${name}%0A` +
                    `*Tarikh:* ${selectedDate} (${selectedTime})%0A` +
                    `*Servis:* ${service}%0A` +
                    `*HP:* ${hp}%0A` +
                    `*Alamat:* ${address}%0A` +
                    `*Total:* ${price}%0A` +
                    `_(Harga termasuk labour & transport)_`;

        window.open(`https://wa.me/${whatsappNumber}?text=${msg}`, '_blank');
    }
</script>
</body>
</html>
